name: Update Pocono Listings

on:
  schedule:
    # Run daily at 7:00 AM ET (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scrape and update listings
        run: node scripts/update-listings.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet index.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update listings $(date +'%Y-%m-%d')

          Automated daily refresh of Pocono waterfront listings.
          Source: LakeHouse.com (direct scrape, no API keys needed)"
          git push
